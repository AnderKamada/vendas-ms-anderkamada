<!DOCTYPE html>
<!--
  ARQUIVO DE DEMONSTRAÇÃO — aula
  Abrir direto no browser (sem servidor).
  Em aula, os valores fixos serão substituídos pelas expressões Thymeleaf correspondentes.
  Procure os comentários "→ THYMELEAF" para saber o que trocar em cada ponto.

  Cenário: cliente já existe no banco e tem CEP preenchido.
  O bloco de endereço enriquecido (logradouro, bairro, etc.) foi retornado pela API ViaCEP via OpenFeign.
-->
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-4xl mx-auto p-4">

    <!-- ============================================================
         NAVBAR
         → THYMELEAF: substituir todo este <nav> por:
           <div th:replace="~{fragments.html :: navbar('clientes')}"></div>
         ============================================================ -->
    <nav class="flex justify-between items-center bg-white p-4 shadow-md rounded-md">
        <div class="flex space-x-4">
            <a href="/"         class="px-4 py-2 rounded bg-gray-200">Início</a>
            <a href="/clientes" class="px-4 py-2 rounded bg-gray-400">Clientes</a>
            <!-- → THYMELEAF: th:classappend="${activePage == 'clientes' ? 'bg-gray-400' : 'bg-gray-200'}" -->
            <a href="/pedidos"  class="px-4 py-2 rounded bg-gray-200">Pedidos</a>
        </div>
        <div class="relative">
            <button class="text-sm text-gray-400" id="userMenuButton">
                <!-- → THYMELEAF: th:text="${session.username}" -->
                aluno-fiap
                <!-- → THYMELEAF: th:src="${session.urlAvatar}" -->
                <img src="https://avatars.githubusercontent.com/u/9919?s=48"
                     alt="Avatar" class="w-8 h-8 rounded-full inline-block ml-2"/>
            </button>
        </div>
    </nav>

    <!-- ============================================================
         FORMULÁRIO DE CADASTRO
         → THYMELEAF:
           <form th:action="@{/clientes/save}" method="post" th:object="${cliente}">
         th:object define o objeto de backing: campos internos usam *{campo}
         ============================================================ -->
    <div class="bg-white p-4 mt-4 shadow-md rounded-md">
        <main>
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Cadastro de cliente</h1>
            <br/>

            <form action="/clientes/save" method="post" class="space-y-4">

                <!-- CPF
                     → THYMELEAF: th:field="*{cpf}"
                       (gera id="cpf", name="cpf" e value="${cliente.cpf}" automaticamente)
                -->
                <div class="flex items-center">
                    <label for="cpf" class="w-32 text-gray-700">CPF</label>
                    <input id="cpf" type="text" name="cpf" value="12345678900"
                           placeholder="Apenas números"
                           class="w-full border rounded px-2 py-1"/>
                </div>

                <!-- Nome
                     → THYMELEAF: th:field="*{nome}"
                -->
                <div class="flex items-center">
                    <label for="nome" class="w-32 text-gray-700">Nome</label>
                    <input id="nome" type="text" name="nome" value="Maria Oliveira"
                           placeholder="Nome completo"
                           class="w-full border rounded px-2 py-1"/>
                </div>

                <!-- CEP
                     → THYMELEAF: th:field="*{cep}"
                -->
                <div class="flex items-center">
                    <label for="cep" class="w-32 text-gray-700">CEP</label>
                    <input id="cep" type="text" name="cep" value="01310100"
                           placeholder="Apenas números (8 dígitos)"
                           pattern="\d{8}" maxlength="8"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           class="w-full border rounded px-2 py-1"/>
                </div>

                <!-- ============================================================
                     BLOCO ENRIQUECIDO PELA API ViaCEP (OpenFeign)
                     Só aparece quando clienteDto.logradouro != null
                     → THYMELEAF: <div th:unless="${cliente.logradouro == null}">
                     Dados retornados por: cepApi.get("01310100") → CepDetails (record Java)
                     ============================================================ -->
                <div class="pl-32 text-sm text-gray-500 space-y-1 border-l-4 border-blue-200 ml-32 py-1">
                    <p class="font-semibold text-blue-600 text-xs uppercase tracking-wide mb-1">
                        ✓ Endereço encontrado via API ViaCEP
                    </p>
                    <!-- → THYMELEAF: th:text="'Rua: ' + *{logradouro}" -->
                    <p>Rua: <strong>Avenida Paulista</strong></p>
                    <!-- → THYMELEAF: th:text="'Bairro: ' + *{bairro}" -->
                    <p>Bairro: <strong>Bela Vista</strong></p>
                    <!-- → THYMELEAF: th:text="*{localidade} + ' / ' + *{estado}" -->
                    <p><strong>São Paulo</strong> / <strong>SP</strong></p>
                </div>

                <!-- Número
                     → THYMELEAF: th:field="*{numero}"
                -->
                <div class="flex items-center">
                    <label for="numero" class="w-32 text-gray-700">Número</label>
                    <input id="numero" type="text" name="numero" value="1578"
                           placeholder="Ex: 123"
                           class="w-full border rounded px-2 py-1"/>
                </div>

                <!-- Complemento
                     → THYMELEAF: th:field="*{complemento}"
                -->
                <div class="flex items-center">
                    <label for="complemento" class="w-32 text-gray-700">Complemento</label>
                    <input id="complemento" type="text" name="complemento" value="Apto 42"
                           placeholder="Ex: Apto 42"
                           class="w-full border rounded px-2 py-1"/>
                </div>

                <!-- Telefone
                     → THYMELEAF: th:field="*{telefone}"
                -->
                <div class="flex items-center">
                    <label for="telefone" class="w-32 text-gray-700">Telefone</label>
                    <input id="telefone" type="text" name="telefone" value="(11) 91234-5678"
                           placeholder="Ex: (11) 91234-5678"
                           class="w-full border rounded px-2 py-1"/>
                </div>

                <div class="flex justify-end">
                    <button type="submit" class="px-4 py-2 bg-gray-800 text-white rounded">
                        Salvar
                    </button>
                </div>
            </form>
        </main>
    </div>

</div>
</body>
</html>
